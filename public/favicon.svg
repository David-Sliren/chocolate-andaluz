<svg class="w-full h-full overflow-visible" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Deep rich cocoa pod body gradient -->
                    <linearGradient id="podGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4a2211"/>
                        <stop offset="35%" stop-color="#733519"/>
                        <stop offset="70%" stop-color="#8c411e"/>
                        <stop offset="100%" stop-color="#2a1208"/>
                    </linearGradient>

                    <!-- Crest highlight gradient -->
                    <linearGradient id="ridgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#d4a373" stop-opacity="0.85"/>
                        <stop offset="50%" stop-color="#a45c2c" stop-opacity="0.5"/>
                        <stop offset="100%" stop-color="#3d1c10" stop-opacity="0.1"/>
                    </linearGradient>

                    <!-- Pod drop shadow filter -->
                    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.65"/>
                    </filter>
                </defs>

                <!-- Floating & rotating icon container -->
                <g filter="url(#iconShadow)">
                    <animateTransform 
                        attributeName="transform" 
                        type="translate" 
                        values="0,0; 0,-8; 0,0" 
                        dur="4s" 
                        repeatCount="indefinite" 
                        additive="sum"/>
                    <animateTransform 
                        attributeName="transform" 
                        type="rotate" 
                        values="-8,100,100; 2,100,100; -8,100,100" 
                        dur="6s" 
                        repeatCount="indefinite" 
                        additive="sum"/>

                    <!-- Main pod silhouette -->
                    <path d="M100,20 C130,35 155,75 150,110 C145,145 125,175 100,185 C75,175 55,145 50,110 C45,75 70,35 100,20 Z" 
                          fill="url(#podGrad)" 
                          stroke="#1a0b05" 
                          stroke-width="2.5" />

                    <!-- Stem top connector -->
                    <path d="M96,20 C96,12 104,12 104,20 Z" fill="#2d1307" stroke="#1a0b05" stroke-width="1.5"/>

                    <!-- Center vertical ridge -->
                    <path d="M100,26 C102,70 102,130 100,178" fill="none" stroke="#180702" stroke-width="4" stroke-linecap="round"/>
                    <path d="M100,26 C102,70 102,130 100,178" fill="none" stroke="url(#ridgeGrad)" stroke-width="2" stroke-linecap="round"/>

                    <!-- Left curved ridges -->
                    <path d="M82,38 C68,75 68,115 82,158" fill="none" stroke="#220b04" stroke-width="3"/>
                    <path d="M82,38 C68,75 68,115 82,158" fill="none" stroke="url(#ridgeGrad)" stroke-width="1.5"/>

                    <path d="M68,58 C56,88 58,118 69,142" fill="none" stroke="#1d0a03" stroke-width="2.5"/>
                    <path d="M68,58 C56,88 58,118 69,142" fill="none" stroke="url(#ridgeGrad)" stroke-width="1"/>

                    <!-- Right curved ridges -->
                    <path d="M118,38 C132,75 132,115 118,158" fill="none" stroke="#220b04" stroke-width="3"/>
                    <path d="M118,38 C132,75 132,115 118,158" fill="none" stroke="url(#ridgeGrad)" stroke-width="1.5"/>

                    <path d="M132,58 C144,88 142,118 131,142" fill="none" stroke="#1d0a04" stroke-width="2.5"/>
                    <path d="M132,58 C144,88 142,118 131,142" fill="none" stroke="url(#ridgeGrad)" stroke-width="1"/>

                    <!-- Glossy light reflection overlay -->
                    <path d="M90,35 C85,75 87,120 95,150" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3" stroke-linecap="round">
                        <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2s" repeatCount="indefinite"/>
                    </path>
                </g>

                <!-- Floating golden aroma sparkles -->
                <g fill="#dda15e">
                    <circle cx="35" cy="50" r="2.5">
                        <animate attributeName="cy" values="50;35;50" dur="3s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="165" cy="130" r="2">
                        <animate attributeName="cy" values="130;115;130" dur="4s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="150" cy="55" r="1.5">
                        <animate attributeName="cy" values="55;42;55" dur="3.5s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
                    </circle>
                </g>
            </svg>
